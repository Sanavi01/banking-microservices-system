services:

  postgres-clientes:
    image: postgres:16
    container_name: db-clientes
    environment:
      POSTGRES_DB: db_clientes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata-clientes:/var/lib/postgresql/data
      - ./docker/init/db_clientes.sql:/docker-entrypoint-initdb.d/01-init.sql

  postgres-cuentas:
    image: postgres:16
    container_name: db-cuentas
    environment:
      POSTGRES_DB: db_cuentas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata-cuentas:/var/lib/postgresql/data
      - ./docker/init/db_cuentas.sql:/docker-entrypoint-initdb.d/01-init.sql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banking-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sofka.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-clientes
      - postgres-cuentas

  rabbitmq:
    image: rabbitmq:4-management
    container_name: banking-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  pgdata-clientes:
  pgdata-cuentas:
